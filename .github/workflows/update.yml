name: Update Margin Rates

on:
  schedule:
    - cron: '0 14 * * *'  # 10am ET daily
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv run python main.py

      - name: Commit if rates changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add margin_rates_history.jsonl docs/
          if git diff --staged --quiet; then
            echo "No rate changes, skipping commit"
          else
            git commit -m "Update rates $(date -u +%Y-%m-%d)"
            git push
          fi
