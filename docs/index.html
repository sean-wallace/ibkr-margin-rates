<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBKR Margin Rates</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #222; padding: 2rem 1rem; }
        .wrap { max-width: 860px; margin: 0 auto; }
        h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: .2rem; }
        .sub { color: #666; font-size: .85rem; margin-bottom: 1.5rem; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 1.5rem; margin-bottom: 1rem; }
        .stats { display: flex; gap: 1rem; }
        .stat { flex: 1; }
        .lbl { font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; color: #999; margin-bottom: .25rem; }
        .val { font-size: 2rem; font-weight: 700; line-height: 1; }
        .range { font-size: .8rem; color: #999; margin-top: .3rem; }
        .usd { color: #4a7fa5; }
        .cad { color: #b05040; }
        footer { text-align: center; font-size: .75rem; color: #bbb; margin-top: 1.5rem; }
        footer a { color: #bbb; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>IBKR Margin Rates</h1>
    <p class="sub" id="subtitle"></p>
    <div class="card">
        <canvas id="chart"></canvas>
    </div>
    <div class="stats">
        <div class="card stat">
            <div class="lbl">USD</div>
            <div class="val usd" id="usd-current"></div>
            <div class="range" id="usd-range"></div>
        </div>
        <div class="card stat">
            <div class="lbl">CAD</div>
            <div class="val cad" id="cad-current"></div>
            <div class="range" id="cad-range"></div>
        </div>
    </div>
    <footer>Rates last changed <span id="last-updated"></span> &middot; <a href="https://www.interactivebrokers.ca/en/trading/margin-rates.php">Source: IBKR</a></footer>
</div>

<script>
const d = JSON.parse(document.getElementById('rate-data').textContent);
const m = d.meta;

document.getElementById('subtitle').textContent    = m.date_range + ' · ' + m.n_points + ' observations';
document.getElementById('usd-current').textContent = m.usd_current + '%';
document.getElementById('usd-range').textContent   = 'Min ' + m.usd_min + '% · Max ' + m.usd_max + '%';
document.getElementById('cad-current').textContent = m.cad_current + '%';
document.getElementById('cad-range').textContent   = 'Min ' + m.cad_min + '% · Max ' + m.cad_max + '%';
document.getElementById('last-updated').textContent = m.last_updated;

new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
        labels: d.labels,
        datasets: [
            {
                label: 'USD',
                data: d.usd,
                borderColor: '#4a7fa5',
                backgroundColor: 'rgba(74,127,165,.1)',
                borderWidth: 2,
                tension: .2,
                fill: true,
                pointRadius: 4,
                pointHoverRadius: 6,
            },
            {
                label: 'CAD',
                data: d.cad,
                borderColor: '#b05040',
                backgroundColor: 'rgba(176,80,64,.1)',
                borderWidth: 2,
                tension: .2,
                fill: true,
                pointRadius: 4,
                pointHoverRadius: 6,
            },
        ],
    },
    options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        scales: {
            x: {
                type: 'time',
                time: {
                    tooltipFormat: 'MMM d, yyyy',
                    displayFormats: { month: 'MMM yyyy', day: 'MMM d' },
                },
                grid: { display: false },
                ticks: { maxTicksLimit: 8 },
            },
            y: {
                ticks: { callback: function(v) { return v.toFixed(2) + '%'; } },
                grid: { color: 'rgba(0,0,0,.04)' },
            },
        },
        plugins: {
            tooltip: {
                callbacks: {
                    label: function(ctx) { return ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(3) + '%'; },
                },
            },
            legend: { position: 'top', align: 'end' },
        },
    },
});
</script>
