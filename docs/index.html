<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBKR Margin Rates</title>
    <script src="https://cdn.jsdelivr.net/npm/plotly.js-basic-dist-min@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        [hidden] { display: none !important; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #222; padding: 2rem 1rem; }
        .wrap { max-width: 860px; margin: 0 auto; }
        h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: .2rem; }
        .sub { color: #666; font-size: .85rem; margin-bottom: 1.5rem; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 1.5rem; margin-bottom: 1rem; }
        .stats { display: flex; gap: 1rem; }
        .stat { flex: 1; }
        .lbl { font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; color: #999; margin-bottom: .25rem; }
        .val { font-size: 2rem; font-weight: 700; line-height: 1; }
        .range { font-size: .8rem; color: #999; margin-top: .3rem; }
        .usd { color: #4a7fa5; }
        .cad { color: #b05040; }
        footer { text-align: center; font-size: .75rem; color: #bbb; margin-top: 1.5rem; }
        footer a { color: #bbb; }

        /* Calculator */
        .calc-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
        .calc-table th { text-align: right; padding: .4rem .6rem; color: #999; font-weight: 500; font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; }
        .calc-table th:first-child { text-align: left; }
        .calc-table td { padding: .4rem .6rem; text-align: right; border-top: 1px solid #f0f0f0; vertical-align: middle; }
        .calc-table td:first-child { text-align: left; color: #555; }
        .calc-table .total-row td { border-top: 2px solid #eee; font-weight: 600; color: #222; }
        .calc-table .savings-row td { border-top: 1px dashed #e0e0e0; font-size: .8rem; color: #6a9a6a; padding-top: .5rem; padding-bottom: .5rem; }
        .input-wrap { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; width: fit-content; }
        .input-wrap span { padding: .35rem .5rem; background: #f5f5f5; color: #888; font-size: .85rem; border-right: 1px solid #ddd; }
        .input-wrap input { border: none; outline: none; padding: .35rem .5rem; font-size: .9rem; width: 6.5rem; font-family: inherit; }
        .total-select { font-size: .8rem; border: 1px solid #ddd; border-radius: 4px; padding: .15rem .25rem; font-family: inherit; color: #555; background: #fff; cursor: pointer; }
        .fx-rate { font-size: .75rem; color: #aaa; }

        /* Tier tooltip */
        .rate-cell { position: relative; display: inline-block; cursor: default; }
        .tier-tip {
            display: none; position: absolute; top: calc(100% + 4px); left: 0;
            min-width: 190px; background: #fff; border: 1px solid #e0e0e0;
            border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.1);
            padding: .5rem .75rem; z-index: 20; font-size: .78rem; color: #444;
            white-space: nowrap; font-weight: normal; text-align: left;
        }
        .rate-cell:hover .tier-tip { display: block; }
        .tier-tip-hd { font-weight: 600; font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; color: #999; margin-bottom: .35rem; }
        .tier-tip-row { display: flex; justify-content: space-between; gap: 1.5rem; padding: .07rem 0; }
        .tier-tip-row .tr { font-weight: 500; color: #222; }

        /* Tier breakdown */
        .breakdown-toggle { text-align: right; margin-top: .5rem; }
        .breakdown-btn { border: none; background: none; color: #bbb; font-size: .75rem; font-family: inherit; cursor: pointer; padding: 0; }
        .breakdown-btn:hover { color: #666; }
        .breakdown-section { margin-top: .75rem; border-top: 1px solid #f0f0f0; padding-top: .75rem; display: flex; gap: 2rem; flex-wrap: wrap; }
        .bd-block { flex: 1; min-width: 180px; }
        .bd-lbl { font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #999; margin-bottom: .3rem; }
        .bd-tbl { width: 100%; border-collapse: collapse; font-size: .78rem; color: #555; }
        .bd-tbl td { padding: .12rem .25rem; }
        .bd-tbl td:not(:first-child) { text-align: right; }
        .bd-tbl .bd-tot td { border-top: 1px solid #eee; font-weight: 600; color: #333; padding-top: .25rem; }
        #chart { height: 300px; }
        @media (max-width: 540px) {
            .calc-table th:nth-child(4), .calc-table td:nth-child(4) { display: none; }
            .input-wrap input { width: 5rem; }
        }
    </style>
</head>

<script>
const d = JSON.parse(document.getElementById('rate-data').textContent);
const m = d.meta;

// 90-day min/max
const cutoff = new Date();
cutoff.setDate(cutoff.getDate() - 90);
const recent = d.labels.reduce(function(acc, label, i) {
    if (new Date(label) >= cutoff) {
        if (d.usd[i] !== null) acc.usd.push(d.usd[i]);
        if (d.cad[i] !== null) acc.cad.push(d.cad[i]);
    }
    return acc;
}, { usd: [], cad: [] });

function r90(arr, fn) { return arr.length ? fn.apply(null, arr).toFixed(3) : null; }
const usd90min = r90(recent.usd, Math.min), usd90max = r90(recent.usd, Math.max);
const cad90min = r90(recent.cad, Math.min), cad90max = r90(recent.cad, Math.max);

document.getElementById('subtitle').textContent     = m.date_range + ' · ' + m.n_points + ' observations';
document.getElementById('usd-current').textContent  = m.usd_current + '%';
document.getElementById('cad-current').textContent  = m.cad_current + '%';
document.getElementById('last-updated').textContent = m.last_updated;
(function() {
    var usdT = m.usd_tiers || [{ threshold: null, rate: parseFloat(m.usd_current) }];
    var cadT = m.cad_tiers || [{ threshold: null, rate: parseFloat(m.cad_current) }];
    var usdNote = document.getElementById('usd-rate-note');
    var cadNote = document.getElementById('cad-rate-note');
    usdNote.textContent = '@ ' + m.usd_current + '%';
    cadNote.textContent = '@ ' + m.cad_current + '%';
    attachTierTooltip(usdNote, 'USD', usdT);
    attachTierTooltip(cadNote, 'CAD', cadT);
}());

document.getElementById('usd-range').textContent = usd90min
    ? '90d: ' + usd90min + '–' + usd90max + '%'
    : 'Min ' + m.usd_min + '% – Max ' + m.usd_max + '%';
document.getElementById('cad-range').textContent = cad90min
    ? '90d: ' + cad90min + '–' + cad90max + '%'
    : 'Min ' + m.cad_min + '% – Max ' + m.cad_max + '%';

Plotly.newPlot('chart', [
    {
        x: d.labels, y: d.usd, name: 'USD', type: 'scatter', mode: 'lines+markers',
        line: { color: '#4a7fa5', width: 2, shape: 'spline', smoothing: 0.5 },
        marker: { size: 4, color: '#4a7fa5' },
        hovertemplate: 'USD: %{y:.3f}%<extra></extra>',
    },
    {
        x: d.labels, y: d.cad, name: 'CAD', type: 'scatter', mode: 'lines+markers',
        line: { color: '#b05040', width: 2, shape: 'spline', smoothing: 0.5 },
        marker: { size: 4, color: '#b05040' },
        hovertemplate: 'CAD: %{y:.3f}%<extra></extra>',
    },
], {
    margin: { t: 10, r: 10, b: 40, l: 50 },
    paper_bgcolor: 'transparent',
    plot_bgcolor: 'transparent',
    xaxis: {
        type: 'date',
        gridcolor: 'rgba(0,0,0,.06)',
        tickformat: '%b %Y',
        tickfont: { size: 11 },
    },
    yaxis: {
        ticksuffix: '%',
        tickformat: '.2f',
        gridcolor: 'rgba(0,0,0,.04)',
        zeroline: false,
    },
    legend: { xanchor: 'right', x: 1, y: 1.02, yanchor: 'bottom', orientation: 'h' },
    hovermode: 'x unified',
}, {
    responsive: true,
    displayModeBar: false,
});

// Calculator
// Bracket math (like income tax): each portion of balance charged at its tier's rate.
function tieredInterest(balance, tiers) {
    if (!tiers || !tiers.length) return 0;
    var interest = 0, remaining = balance, prev = 0;
    for (var i = 0; i < tiers.length; i++) {
        var cap = tiers[i].threshold !== null ? tiers[i].threshold : Infinity;
        var chunk = Math.min(remaining, cap - prev);
        if (chunk <= 0) break;
        interest += chunk * (tiers[i].rate / 100);
        remaining -= chunk;
        prev = cap;
        if (remaining <= 0) break;
    }
    return interest; // annual
}

function fmtM(n) {
    if (n >= 1e9) return '$' + (n / 1e9) + 'B';
    if (n >= 1e6) return '$' + (n / 1e6 % 1 === 0 ? n / 1e6 : (n / 1e6).toFixed(1)) + 'M';
    if (n >= 1e3) return '$' + Math.round(n / 1e3) + 'k';
    return '$0';
}

function tierRange(lo, hi) {
    return hi !== null ? (lo === 0 ? '$0' : fmtM(lo)) + ' – ' + fmtM(hi) : fmtM(lo) + '+';
}

function attachTierTooltip(el, currency, tiers) {
    var tip = document.createElement('div');
    tip.className = 'tier-tip';
    var hd = document.createElement('div');
    hd.className = 'tier-tip-hd';
    hd.textContent = currency + ' rate schedule';
    tip.appendChild(hd);
    var prev = 0;
    for (var i = 0; i < tiers.length; i++) {
        var row = document.createElement('div');
        row.className = 'tier-tip-row';
        row.innerHTML = '<span>' + tierRange(prev, tiers[i].threshold) + '</span><span class="tr">' + tiers[i].rate.toFixed(3) + '%</span>';
        tip.appendChild(row);
        prev = tiers[i].threshold;
    }
    el.appendChild(tip);
}

function buildBreakdownBlock(elId, currency, balance, tiers) {
    var el = document.getElementById(elId);
    if (!balance) { el.innerHTML = ''; return; }
    var rows = [], remaining = balance, prev = 0, totalInterest = 0;
    for (var i = 0; i < tiers.length; i++) {
        var cap = tiers[i].threshold !== null ? tiers[i].threshold : Infinity;
        var chunk = Math.min(remaining, cap - prev);
        if (chunk <= 0) break;
        var interest = chunk * tiers[i].rate / 100;
        totalInterest += interest;
        rows.push({ range: tierRange(prev, tiers[i].threshold), rate: tiers[i].rate, chunk: chunk, interest: interest });
        remaining -= chunk;
        prev = tiers[i].threshold !== null ? tiers[i].threshold : Infinity;
        if (remaining <= 0) break;
    }
    var html = '<div class="bd-lbl">' + currency + '</div><table class="bd-tbl">';
    for (var j = 0; j < rows.length; j++) {
        var r = rows[j];
        html += '<tr><td>' + r.range + '</td><td>' + r.rate.toFixed(3) + '%</td><td>$' + Math.round(r.chunk).toLocaleString('en-CA') + '</td><td>' + fmt(r.interest) + '/yr</td></tr>';
    }
    if (rows.length > 1) {
        html += '<tr class="bd-tot"><td colspan="2"></td><td>$' + Math.round(balance).toLocaleString('en-CA') + '</td><td>' + fmt(totalInterest) + '/yr</td></tr>';
    }
    html += '</table>';
    el.innerHTML = html;
}

function toggleBreakdown() {
    var bd = document.getElementById('breakdown');
    var opening = bd.hidden;
    bd.hidden = !opening;
    document.getElementById('breakdown-btn').textContent = (opening ? '▴' : '▾') + ' tier breakdown';
    if (opening) updateBreakdown();
}

function updateBreakdown() {
    if (document.getElementById('breakdown').hidden) return;
    var usdBal  = parseBalance(document.getElementById('usd-balance').value);
    var cadBal  = parseBalance(document.getElementById('cad-balance').value);
    var usdT = m.usd_tiers || [{ threshold: null, rate: parseFloat(m.usd_current) }];
    var cadT = m.cad_tiers || [{ threshold: null, rate: parseFloat(m.cad_current) }];
    buildBreakdownBlock('bd-usd', 'USD', usdBal, usdT);
    buildBreakdownBlock('bd-cad', 'CAD', cadBal, cadT);
}

let usdToCad = null;

function fmt(n) {
    return '$' + n.toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtBal(n) {
    return '$' + Math.round(n).toLocaleString('en-CA');
}

function parseBalance(val) {
    return parseFloat(val.replace(/,/g, '')) || 0;
}

function formatInput(input) {
    const cursor = input.selectionStart;
    const oldLen = input.value.length;
    const digits = input.value.replace(/[^\d]/g, '');
    if (!digits) { input.value = ''; return; }
    const formatted = parseInt(digits, 10).toLocaleString('en-CA');
    input.value = formatted;
    const newCursor = Math.max(0, cursor + formatted.length - oldLen);
    input.setSelectionRange(newCursor, newCursor);
}

function updateCalc() {
    const usdBal  = parseBalance(document.getElementById('usd-balance').value);
    const cadBal  = parseBalance(document.getElementById('cad-balance').value);
    const totalCurrency = document.getElementById('total-currency').value;

    const usdTiers = m.usd_tiers || [{ threshold: null, rate: parseFloat(m.usd_current) }];
    const cadTiers = m.cad_tiers || [{ threshold: null, rate: parseFloat(m.cad_current) }];

    const usdAnnual = tieredInterest(usdBal, usdTiers);
    const cadAnnual = tieredInterest(cadBal, cadTiers);
    const usd = { daily: usdAnnual / 365, monthly: usdAnnual / 12, annual: usdAnnual };
    const cad = { daily: cadAnnual / 365, monthly: cadAnnual / 12, annual: cadAnnual };

    document.getElementById('usd-daily').textContent   = usdBal ? fmt(usd.daily)   : '—';
    document.getElementById('usd-monthly').textContent = usdBal ? fmt(usd.monthly) : '—';
    document.getElementById('usd-annual').textContent  = usdBal ? fmt(usd.annual)  : '—';

    document.getElementById('cad-daily').textContent   = cadBal ? fmt(cad.daily)   : '—';
    document.getElementById('cad-monthly').textContent = cadBal ? fmt(cad.monthly) : '—';
    document.getElementById('cad-annual').textContent  = cadBal ? fmt(cad.annual)  : '—';

    const hasAny = usdBal || cadBal;
    const usdFactor = totalCurrency === 'USD' ? 1 : usdToCad;
    const cadFactor = totalCurrency === 'CAD' ? 1 : 1 / usdToCad;

    if (hasAny && usdToCad) {
        document.getElementById('total-balance').value       = Math.round(usdBal * usdFactor + cadBal * cadFactor).toLocaleString('en-CA');
        document.getElementById('total-daily').textContent   = fmt(usd.daily   * usdFactor + cad.daily   * cadFactor);
        document.getElementById('total-monthly').textContent = fmt(usd.monthly * usdFactor + cad.monthly * cadFactor);
        document.getElementById('total-annual').textContent  = fmt(usd.annual  * usdFactor + cad.annual  * cadFactor);
    } else {
        document.getElementById('total-balance').value       = '—';
        document.getElementById('total-daily').textContent   = '—';
        document.getElementById('total-monthly').textContent = '—';
        document.getElementById('total-annual').textContent  = '—';
    }

    // Potential savings from converting the higher-rate balance to the cheaper currency.
    // Compute interest in both scenarios and convert to target currency to keep units consistent.
    const savingsRow = document.getElementById('savings-row');
    const higherIsUSD = parseFloat(m.usd_current) > parseFloat(m.cad_current);
    const higherBal = higherIsUSD ? usdBal : cadBal;
    if (usdToCad && higherBal) {
        let savingAnnual;
        if (higherIsUSD) {
            const currentCost     = tieredInterest(usdBal, usdTiers) * usdFactor;
            const hypotheticalCost = tieredInterest(usdBal * usdToCad, cadTiers) * cadFactor;
            savingAnnual = currentCost - hypotheticalCost;
            document.getElementById('savings-label').textContent = 'Est. savings if USD balance borrowed in CAD';
        } else {
            const currentCost     = tieredInterest(cadBal, cadTiers) * cadFactor;
            const hypotheticalCost = tieredInterest(cadBal / usdToCad, usdTiers) * usdFactor;
            savingAnnual = currentCost - hypotheticalCost;
            document.getElementById('savings-label').textContent = 'Est. savings if CAD balance borrowed in USD';
        }
        if (savingAnnual > 0) {
            document.getElementById('savings-daily').textContent   = fmt(savingAnnual / 365);
            document.getElementById('savings-monthly').textContent = fmt(savingAnnual / 12);
            document.getElementById('savings-annual').textContent  = fmt(savingAnnual);
            savingsRow.hidden = false;
        } else {
            savingsRow.hidden = true;
        }
    } else {
        savingsRow.hidden = true;
    }
    updateBreakdown();
}

function saveInputs() {
    localStorage.setItem('usd-balance', document.getElementById('usd-balance').value);
    localStorage.setItem('cad-balance', document.getElementById('cad-balance').value);
    localStorage.setItem('total-currency', document.getElementById('total-currency').value);
}

// Fetch live USD/CAD exchange rate, with fallback
function setFxRate(rate) {
    usdToCad = rate;
    document.getElementById('fx-rate').textContent = '1 USD = ' + rate.toFixed(4) + ' CAD';
    updateCalc();
}

fetch('https://open.er-api.com/v6/latest/USD')
    .then(function(r) { return r.json(); })
    .then(function(data) { setFxRate(data.rates.CAD); })
    .catch(function() {
        fetch('https://api.frankfurter.app/latest?from=USD&to=CAD')
            .then(function(r) { return r.json(); })
            .then(function(data) { setFxRate(data.rates.CAD); })
            .catch(function() {
                document.getElementById('fx-rate').textContent = 'rate unavailable';
            });
    });

// Restore saved values on load
const savedUsd      = localStorage.getItem('usd-balance');
const savedCad      = localStorage.getItem('cad-balance');
const savedCurrency = localStorage.getItem('total-currency');
if (savedUsd)      document.getElementById('usd-balance').value    = savedUsd;
if (savedCad)      document.getElementById('cad-balance').value    = savedCad;
if (savedCurrency) document.getElementById('total-currency').value = savedCurrency;

document.getElementById('usd-balance').addEventListener('input', function() { formatInput(this); saveInputs(); updateCalc(); });
document.getElementById('cad-balance').addEventListener('input', function() { formatInput(this); saveInputs(); updateCalc(); });
document.getElementById('total-currency').addEventListener('change', function() { saveInputs(); updateCalc(); });
</script>
</body>
